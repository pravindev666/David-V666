name: Market Data Sync

on:
  schedule:
    # Runs once daily at 9:15 AM IST (3:45 UTC) — Mon to Fri
    - cron: '45 3 * * 1-5'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance nsepython scikit-learn catboost lightgbm hmmlearn scipy

      - name: Run Data Sync Script
        run: |
          python data_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "David Data Bot"
          git config --global user.email "bot@david-ml.com"

          git add data/*.csv
          git add data/last_synced.txt

          if git diff --staged --quiet; then
            echo "No changes to commit — data already up to date"
          else
            git commit -m "Auto-sync: Market data $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
